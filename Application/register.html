<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription | INITIC</title>

<link rel="stylesheet" href="../CSS/responsive.css">
<link rel="stylesheet" href="../CSS/authentification.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>INITIC</h1>

<p>
Plateforme intelligente d'apprentissage
et d'évaluation formative.
</p>

<ul>
<li>Apprenez à votre rythme</li>
<li>Évaluations instantanées</li>
<li>Suivi de votre progression</li>
<li>Assistance personnalisée</li>
</ul>

</div>

<div class="right">

<form id="registerForm">

<h2>Créer un compte</h2>

<input type="text" id="name" placeholder="Nom complet" required>

<input type="email" id="email" placeholder="Adresse email" required>

<input type="password" id="password" placeholder="Mot de passe (min 6 caractères)" required>

<select id="role">
<option value="student">Élève</option>
<option value="teacher">Enseignant</option>
</select>

<button type="submit" aria-label="Créer mon compte et m'inscrire">
Créer le compte
</button>

<p>
Vous avez déjà un compte ?
<a href="login.html" aria-label="Se connecter">Se connecter</a>
</p>

</form>

</div>

</div>

<script src="../Java Script/authentification.js"></script>

</body>

</html>
